# ============================================================
#  Jira Auto-Assign Configuration
#  Fill in your values below before running the application.
# ============================================================

# --- Jira Connection ---
# Your Jira Cloud base URL (no trailing slash)
jira.url=https://yourcompany.atlassian.net
# The email address you use to log into Jira
jira.email=you@example.com
# API token from: https://id.atlassian.com/manage-profile/security/api-tokens
jira.api-token=your-api-token-here
# The Jira project key (e.g. PROJ, DEV, BACKEND)
jira.project-key=PROJ

# --- Round-Robin Assignees ---
# Comma-separated list of team member emails.
# Tickets are assigned to each person in order, cycling back to the start.
jira.assignees=user1@example.com,user2@example.com,user3@example.com

# --- Ticket Filters ---
# Only pick tickets with these statuses. Leave empty to include all statuses.
jira.target-statuses=To Do,Open
# Only pick these issue types (e.g. Bug,Story,Task). Leave empty for all types.
jira.target-issue-types=
# Only pick tickets with these labels. Leave empty for all labels.
jira.target-labels=

# Only assign tickets that currently have no assignee (recommended: true)
jira.only-unassigned=true

# --- Dry Run ---
# true  = log what would be assigned but make NO changes in Jira (safe to test)
# false = actually assign tickets in Jira
jira.dry-run=false

# --- Scheduler ---
# Cron expression controlling how often the assignment runs automatically.
# Format: second minute hour day-of-month month day-of-week
# Examples:
#   Every 30 min  : 0 */30 * * * *
#   Every hour    : 0 0 * * * *
#   Daily at 9 AM : 0 0 9 * * *
jira.schedule.cron=0 */30 * * * *
